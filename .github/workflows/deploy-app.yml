name: Deploy Full Stack App

on:
  push:
    branches:
      - develop  
      - main     
    paths:
      # Backend paths
      - 'Backend/**'
      # Frontend paths (Updated to reflect the frontend folder)
      - 'frontend/src/**' 
      - 'frontend/public/**'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/vite.config.ts'
      - 'frontend/index.html'

env:
  GCP_REGION: europe-west1

jobs:
  set-environment:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set-env.outputs.ENV_NAME }}
    steps:
      - id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV_NAME=prod" >> $GITHUB_OUTPUT
          else
            echo "ENV_NAME=dev" >> $GITHUB_OUTPUT
          fi

  build-and-deploy:
    needs: set-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.set-environment.outputs.env_name }}
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.WIF_POOL_ID }}/providers/${{ secrets.WIF_PROVIDER_ID }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and Push Backend Docker Image
        run: |
          IMAGE_TAG=${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gym-app-images-${{ needs.set-environment.outputs.env_name }}/gym-backend:${{ github.sha }}
          
          docker build -t $IMAGE_TAG -f Backend/Dockerfile Backend/
          docker push $IMAGE_TAG
          
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy gym-backend-service-${{ needs.set-environment.outputs.env_name }} \
            --image ${{ env.IMAGE_TAG }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Fetch Dynamic Infrastructure Values
        id: fetch-infra
        run: |
          echo "Fetching Cloud Run API URL..."
          API_URL=$(gcloud run services describe gym-backend-service-${{ needs.set-environment.outputs.env_name }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          
          echo "Fetching GCS Bucket Name..."
          BUCKET_NAME=$(gcloud storage buckets list \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --filter "name~gym-app-ui-${{ needs.set-environment.outputs.env_name }}" \
            --format "value(name)" \
            --limit 1)
            
          echo "VITE_API_URL=$API_URL" >> $GITHUB_ENV
          echo "BUCKET_NAME=$BUCKET_NAME" >> $GITHUB_ENV

      - name: Build React App
        working-directory: ./frontend 
        run: npm run build

      - name: Deploy Frontend to Cloud Storage
        working-directory: ./frontend 
        run: |
          gcloud storage rsync ./dist gs://${{ env.BUCKET_NAME }} --recursive --delete-unmatched