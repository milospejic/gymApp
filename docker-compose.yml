services:
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: mssql_server
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD:-ComplexPassword123!}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: gym_backend
    ports:
      - "7151:7151"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__GymDBConnection=Server=db;Database=GymDB;User Id=sa;Password=${DB_PASSWORD:-ComplexPassword123!};TrustServerCertificate=True;
      - Jwt__Key=${JWT_SECRET_KEY:-default_secret_key_for_dev_only_32_chars!}
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:7151
    container_name: gym_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mssql_data:
