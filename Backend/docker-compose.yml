
services:
  db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: mssql_server
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    restart: unless-stopped

  backend:
    build: .
    container_name: gym_backend
    ports:
      - "7151:7151"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__GymDBConnection=Server=db;Database=GymDB;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;
      - Jwt__Key=${JWT_SECRET_KEY}
    depends_on:
      - db
    restart: unless-stopped

volumes:
  mssql_data: